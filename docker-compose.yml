version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: snake_user
      POSTGRES_PASSWORD: snake_password
      POSTGRES_DB: snake_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snake_user -d snake_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://snake_user:snake_password@db:5432/snake_db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:3000"


volumes:
  postgres_data:
