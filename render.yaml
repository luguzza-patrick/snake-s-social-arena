services:
  - type: web
    name: snake-social-arena
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snake-db
          property: connectionString
      - key: ENV
        value: production
    # Render automatically detects Dockerfile in root

databases:
  - name: snake-db
    plan: free
