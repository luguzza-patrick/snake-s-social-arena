openapi: 3.0.3
info:
  title: Snake Social Arena API
  description: Backend API for the real-time multiplayer Snake game platform.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Local development server
paths:
  /auth/session:
    get:
      summary: Get current session
      description: Returns the currently authenticated user based on session cookies/tokens.
      operationId: getSession
      responses:
        '200':
          description: Successfully retrieved session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated.

  /auth/login:
    post:
      summary: User login
      description: Authenticates a user with a username and password.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Credentials'
      responses:
        '200':
          description: Successfully logged in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid credentials format.
        '401':
          description: Incorrect username or password.

  /auth/signup:
    post:
      summary: User signup
      description: Registers a new user.
      operationId: signUp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Credentials'
      responses:
        '201':
          description: Successfully created user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid data or username already exists.

  /auth/logout:
    post:
      summary: User logout
      description: Ends the current user session.
      operationId: logout
      responses:
        '200':
          description: Successfully logged out.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

  /leaderboard:
    get:
      summary: Get leaderboard
      description: Retrieves the highest scores across all game modes.
      operationId: getLeaderboard
      responses:
        '200':
          description: A list of leaderboard entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaderboardEntry'
    post:
      summary: Submit score
      description: Submits a new score for the current or specified user.
      operationId: submitScore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - score
                - mode
              properties:
                score:
                  type: integer
                  minimum: 0
                mode:
                  $ref: '#/components/schemas/SnakeMode'
                username:
                  type: string
                  description: Optional. If not provided, uses the authenticated user's name or 'Guest Snake'.
      responses:
        '201':
          description: Score successfully submitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardEntry'

  /live-players:
    get:
      summary: Get live players
      description: Retrieves the current state of active games being played on the server for spectating.
      operationId: getLivePlayers
      responses:
        '200':
          description: A list of spectated players and their game states.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SpectatedPlayer'

components:
  schemas:
    User:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
          example: 'u-pixel'
        username:
          type: string
          example: 'pixel'

    Credentials:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: 'pixel'
        password:
          type: string
          format: password
          minLength: 3

    SnakeMode:
      type: string
      enum:
        - pass-through
        - walls
      example: 'walls'

    Direction:
      type: string
      enum:
        - up
        - down
        - left
        - right
      example: 'right'

    Point:
      type: object
      required:
        - x
        - y
      properties:
        x:
          type: integer
          example: 5
        y:
          type: integer
          example: 5

    SnakeState:
      type: object
      required:
        - gridSize
        - snake
        - food
        - direction
        - nextDirection
        - score
        - mode
        - status
      properties:
        gridSize:
          type: integer
          example: 18
        snake:
          type: array
          items:
            $ref: '#/components/schemas/Point'
        food:
          $ref: '#/components/schemas/Point'
        direction:
          $ref: '#/components/schemas/Direction'
        nextDirection:
          $ref: '#/components/schemas/Direction'
        score:
          type: integer
          example: 120
        mode:
          $ref: '#/components/schemas/SnakeMode'
        status:
          type: string
          enum:
            - ready
            - playing
            - paused
            - game-over
          example: 'playing'

    LeaderboardEntry:
      type: object
      required:
        - id
        - username
        - score
        - mode
      properties:
        id:
          type: string
          example: 'l-1'
        username:
          type: string
          example: 'NeonNoodle'
        score:
          type: integer
          example: 420
        mode:
          $ref: '#/components/schemas/SnakeMode'

    SpectatedPlayer:
      type: object
      required:
        - id
        - username
        - mode
        - state
      properties:
        id:
          type: string
          example: 's-1'
        username:
          type: string
          example: 'NeonNoodle'
        mode:
          $ref: '#/components/schemas/SnakeMode'
        state:
          $ref: '#/components/schemas/SnakeState'
